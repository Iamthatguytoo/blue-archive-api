services:

  init_db:
    build: .
    container_name: blue_archive_db
    env_file:
      - .env.prod
    command: python -m db.blue_archive_characters
    restart: "no"

  api:
    build: .
    container_name: blue_archive_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    command: python -m uvicorn blue_archive_characters_api:server --host 0.0.0.0 --port 8000

volumes:
  mongo_data: